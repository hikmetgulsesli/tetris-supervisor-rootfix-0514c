<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pause Overlay - Arcade Tetris</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#c4e7ff",
                    "on-surface": "#dee3e8",
                    "on-primary-fixed": "#001e2c",
                    "tertiary": "#ffc176",
                    "tertiary-fixed": "#ffddb8",
                    "on-tertiary-container": "#613b00",
                    "secondary-container": "#6f00be",
                    "secondary-fixed": "#f0dbff",
                    "tertiary-container": "#f1a02b",
                    "on-secondary-fixed-variant": "#6900b3",
                    "inverse-primary": "#00668a",
                    "on-secondary-container": "#d6a9ff",
                    "on-primary": "#00354a",
                    "on-surface-variant": "#bdc8d1",
                    "secondary": "#ddb7ff",
                    "on-tertiary-fixed": "#2a1700",
                    "outline": "#87929a",
                    "surface": "#0f1418",
                    "surface-variant": "#303539",
                    "on-background": "#dee3e8",
                    "surface-container-lowest": "#0a0f12",
                    "on-primary-fixed-variant": "#004c69",
                    "inverse-on-surface": "#2c3135",
                    "primary-container": "#38bdf8",
                    "surface-tint": "#7bd0ff",
                    "surface-bright": "#343a3e",
                    "error": "#ffb4ab",
                    "on-error": "#690005",
                    "surface-container-high": "#252b2e",
                    "error-container": "#93000a",
                    "primary": "#8ed5ff",
                    "outline-variant": "#3e484f",
                    "surface-dim": "#0f1418",
                    "surface-container-low": "#171c20",
                    "primary-fixed-dim": "#7bd0ff",
                    "background": "#0f1418",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#2c0051",
                    "on-primary-container": "#004965",
                    "inverse-surface": "#dee3e8",
                    "secondary-fixed-dim": "#ddb7ff",
                    "on-secondary": "#490080",
                    "on-tertiary": "#472a00",
                    "surface-container-highest": "#303539",
                    "surface-container": "#1b2024",
                    "tertiary-fixed-dim": "#ffb960"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "touch-target": "44px",
                    "stack-gap": "12px",
                    "base": "4px",
                    "grid-gutter": "1px",
                    "container-padding-sm": "16px",
                    "container-padding-lg": "32px"
            },
            "fontFamily": {
                    "body-lg": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "display-lg-mobile": ["Hanken Grotesk"],
                    "headline-sm": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"],
                    "label-md": ["JetBrains Mono"],
                    "label-sm": ["JetBrains Mono"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "display-lg-mobile": ["36px", {"lineHeight": "1.1", "fontWeight": "800"}],
                    "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "label-sm": ["12px", {"lineHeight": "1.0", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden relative font-body-md select-none">
<!-- Dimmed Background Context (Active Game Board) -->
<div class="absolute inset-0 flex flex-col md:flex-row items-center justify-center gap-container-padding-lg p-container-padding-sm opacity-20 pointer-events-none filter blur-[2px]">
<!-- Left HUD (Desktop) / Top HUD (Mobile) -->
<div class="flex md:flex-col gap-stack-gap order-2 md:order-1 items-end w-full md:w-32 justify-center">
<div class="bg-surface-container rounded p-3 w-24 h-24 flex flex-col items-center justify-between border border-outline-variant">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Hold</span>
<div class="w-10 h-10 border border-outline-variant/30 grid grid-cols-4 grid-rows-4 gap-grid-gutter p-[2px]">
<!-- Simulated T-Piece -->
<div class="col-start-2 col-span-3 row-start-2 h-full flex items-center justify-center gap-grid-gutter">
<div class="w-full h-full bg-secondary"></div>
<div class="w-full h-full bg-secondary"></div>
<div class="w-full h-full bg-secondary"></div>
</div>
<div class="col-start-3 row-start-1 w-full h-full bg-secondary"></div>
</div>
</div>
<div class="bg-surface-container rounded p-3 w-24 flex flex-col items-center border border-outline-variant hidden md:flex">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-2">Score</span>
<span class="font-headline-md text-headline-md text-primary font-label-md">124k</span>
</div>
</div>
<!-- Central Game Matrix -->
<div class="bg-surface-container-low border-2 border-outline-variant rounded p-1 order-1 md:order-2">
<div class="w-[200px] h-[400px] bg-surface grid grid-cols-10 grid-rows-20 gap-grid-gutter p-grid-gutter border border-outline-variant/50 relative">
<!-- Grid Lines (CSS implementation) -->
<div class="absolute inset-0 bg-[linear-gradient(to_right,#3341551a_1px,transparent_1px),linear-gradient(to_bottom,#3341551a_1px,transparent_1px)] bg-[size:20px_20px]"></div>
<!-- Simulated Game State Blocks -->
<div class="col-start-4 row-start-19 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-5 row-start-19 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-6 row-start-19 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-7 row-start-19 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-2 row-start-20 w-full h-full bg-tertiary-container relative z-10"></div>
<div class="col-start-3 row-start-20 w-full h-full bg-tertiary-container relative z-10"></div>
<div class="col-start-4 row-start-20 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-5 row-start-20 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-6 row-start-20 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-7 row-start-20 w-full h-full bg-primary-container relative z-10"></div>
<div class="col-start-8 row-start-20 w-full h-full bg-error relative z-10"></div>
<div class="col-start-9 row-start-20 w-full h-full bg-error relative z-10"></div>
</div>
</div>
<!-- Right HUD -->
<div class="flex md:flex-col gap-stack-gap order-3 items-start w-full md:w-32 justify-center">
<div class="bg-surface-container rounded p-3 w-24 h-32 flex flex-col items-center justify-start border border-outline-variant gap-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Next</span>
<div class="w-8 h-8 grid grid-cols-2 gap-grid-gutter">
<div class="bg-tertiary w-full h-full"></div>
<div class="bg-tertiary w-full h-full"></div>
<div class="bg-tertiary w-full h-full"></div>
<div class="bg-tertiary w-full h-full"></div>
</div>
</div>
<div class="bg-surface-container rounded p-3 w-24 flex flex-col items-center border border-outline-variant hidden md:flex">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-2">Level</span>
<span class="font-headline-md text-headline-md text-tertiary font-label-md">14</span>
</div>
</div>
</div>
<!-- Pause Overlay (Active Layer) -->
<div class="absolute inset-0 z-50 bg-background/70 backdrop-blur-xl flex flex-col items-center justify-center p-container-padding-sm">
<!-- Header -->
<div class="mb-container-padding-lg text-center flex flex-col items-center gap-2">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-widest uppercase drop-shadow-[0_0_15px_rgba(142,213,255,0.4)]">Paused</h1>
<div class="flex gap-4 items-center bg-surface-container-high px-4 py-2 rounded-full border border-outline-variant">
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Score</span>
<span class="font-label-md text-label-md text-on-surface">124,500</span>
</div>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Level</span>
<span class="font-label-md text-label-md text-tertiary">14</span>
</div>
</div>
</div>
<!-- Menu Options -->
<div class="w-full max-w-[320px] flex flex-col gap-stack-gap">
<button class="w-full h-touch-target min-h-[56px] flex items-center justify-center gap-2 bg-primary text-on-primary rounded font-headline-sm text-headline-sm uppercase tracking-wide hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(142,213,255,0.3)] transition-all active:scale-95 duration-100 group">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                Resume
            </button>
<button class="w-full h-touch-target min-h-[56px] flex items-center justify-center gap-2 bg-surface-container border border-outline text-on-surface rounded font-label-md text-label-md uppercase tracking-wide hover:border-primary hover:text-primary hover:bg-surface-variant transition-all active:scale-95 duration-100">
<span class="material-symbols-outlined">refresh</span>
                Restart Game
            </button>
<button class="w-full h-touch-target min-h-[56px] flex items-center justify-center gap-2 bg-surface-container border border-outline text-on-surface rounded font-label-md text-label-md uppercase tracking-wide hover:border-primary hover:text-primary hover:bg-surface-variant transition-all active:scale-95 duration-100">
<span class="material-symbols-outlined">settings</span>
                Options
            </button>
<button class="w-full h-touch-target min-h-[56px] flex items-center justify-center gap-2 bg-surface-container border border-outline-variant text-on-surface-variant rounded font-label-md text-label-md uppercase tracking-wide mt-4 hover:border-error hover:text-error hover:bg-surface-variant transition-all active:scale-95 duration-100">
<span class="material-symbols-outlined">logout</span>
                Exit to Menu
            </button>
</div>
</div>
</body></html>
