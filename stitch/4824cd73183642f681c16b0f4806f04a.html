                    1,248,900
                </span>

<div class="bg-surface-container border border-outline-variant rounded-lg p-4 flex flex-col items-center justify-center h-24">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-2">Level</span>
<span class="font-headline-md text-headline-md text-on-surface">18</span>
</div>

<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-2">Lines</span>
<span class="font-headline-md text-headline-md text-on-surface">142</span>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">replay</span>
<span class="font-label-md text-label-md">Replay Now</span>
</button>

<button class="flex-1 border border-outline-variant text-primary h-touch-target rounded-full flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors active:scale-95 duration-100">

<span class="font-label-md text-label-md hidden sm:inline">Share</span>
</button>
<button class="flex-1 border border-outline-variant text-primary h-touch-target rounded-full flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined">menu</span>
<span class="font-label-md text-label-md hidden sm:inline">Main Menu</span>
